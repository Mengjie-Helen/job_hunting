<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Hunt Dashboard — Helen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      font-size: 13px;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 12px; opacity: 0.6; }

    #stats {
      background: white;
      padding: 12px 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: #64748b;
    }
    #stats b { color: #1a1a2e; }

    #controls {
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #f5f7fa;
    }
    #controls button {
      padding: 6px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      color: #475569;
    }
    #controls button:hover { background: #f1f5f9; }
    #controls button.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }

    .table-wrap {
      overflow-x: auto;
      padding: 0 24px 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    thead th {
      background: #1a1a2e;
      color: white;
      padding: 10px 12px;
      text-align: left;
      font-weight: 500;
      font-size: 12px;
      white-space: nowrap;
    }

    .filter-row th {
      background: #f8fafc;
      padding: 6px 8px;
    }
    .filter-row input, .filter-row select {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      font-size: 12px;
      background: white;
      color: #1a1a2e;
    }
    .filter-row input:focus, .filter-row select:focus {
      outline: none;
      border-color: #6366f1;
    }

    tbody tr { border-bottom: 1px solid #f1f5f9; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr.hidden { display: none; }

    td {
      padding: 10px 12px;
      vertical-align: top;
      line-height: 1.4;
    }

    td.title { font-weight: 500; min-width: 180px; }
    td.company { font-weight: 600; color: #4f46e5; min-width: 100px; }
    td.location { min-width: 130px; color: #475569; }
    td.salary { min-width: 120px; color: #059669; font-weight: 500; }
    td.date-posted { min-width: 90px; color: #94a3b8; }
    td.pull-date { min-width: 90px; color: #94a3b8; }
    td.why { min-width: 200px; max-width: 260px; color: #475569; font-size: 12px; }

    td.link a {
      display: inline-block;
      padding: 4px 10px;
      background: #4f46e5;
      color: white;
      border-radius: 5px;
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    td.link a:hover { background: #4338ca; }

    td.status select {
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid #e2e8f0;
      font-size: 12px;
      cursor: pointer;
      background: white;
      min-width: 120px;
    }

    /* status color coding */
    select.s-applied     { border-color: #6366f1; color: #4f46e5; background: #eef2ff; }
    select.s-phone       { border-color: #f59e0b; color: #d97706; background: #fffbeb; }
    select.s-interviewing{ border-color: #3b82f6; color: #2563eb; background: #eff6ff; }
    select.s-offer       { border-color: #10b981; color: #059669; background: #ecfdf5; }
    select.s-declined    { border-color: #ef4444; color: #dc2626; background: #fef2f2; }
    select.s-rejected    { border-color: #9ca3af; color: #6b7280; background: #f9fafb; }

    #loading {
      text-align: center;
      padding: 60px;
      color: #94a3b8;
      font-size: 14px;
    }

    #no-results {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Job Hunt Dashboard</h1>
  <span id="last-updated"></span>
</header>

<div id="stats">
  <div>Total: <b id="stat-total">—</b></div>
  <div>Showing: <b id="stat-showing">—</b></div>
  <div>Applied: <b id="stat-applied">—</b></div>
  <div>Interviewing: <b id="stat-interviewing">—</b></div>
  <div>Offers: <b id="stat-offers">—</b></div>
</div>

<div id="controls">
  <span style="font-size:12px;color:#64748b;margin-right:4px;">Filter by status:</span>
  <button class="active" onclick="filterStatus('all', this)">All</button>
  <button onclick="filterStatus('not applied', this)">Not Applied</button>
  <button onclick="filterStatus('applied', this)">Applied</button>
  <button onclick="filterStatus('phone screen', this)">Phone Screen</button>
  <button onclick="filterStatus('interviewing', this)">Interviewing</button>
  <button onclick="filterStatus('offer received', this)">Offer</button>
  <button onclick="filterStatus('declined', this)">Declined</button>
  <button onclick="filterStatus('rejected', this)">Rejected</button>
  <button onclick="clearAllFilters()" style="margin-left:auto;">Clear Filters</button>
</div>

<div class="table-wrap">
  <div id="loading">Loading job listings…</div>
  <div id="no-results">No jobs match the current filters.</div>

  <table id="job-table" style="display:none">
    <thead>
      <tr>
        <th>Job Title</th>
        <th>Company</th>
        <th>Location</th>
        <th>Salary Range</th>
        <th>Date Posted</th>
        <th>Apply</th>
        <th>Why It Matches</th>
        <th>Pull Date</th>
        <th>Status</th>
      </tr>
      <tr class="filter-row">
        <th><input type="text" placeholder="Filter…" oninput="applyFilters()" id="f-title" /></th>
        <th><input type="text" placeholder="Filter…" oninput="applyFilters()" id="f-company" /></th>
        <th><input type="text" placeholder="Filter…" oninput="applyFilters()" id="f-location" /></th>
        <th><input type="text" placeholder="Filter…" oninput="applyFilters()" id="f-salary" /></th>
        <th><input type="text" placeholder="Filter…" oninput="applyFilters()" id="f-date-posted" /></th>
        <th></th>
        <th><input type="text" placeholder="Filter…" oninput="applyFilters()" id="f-why" /></th>
        <th><input type="text" placeholder="Filter…" oninput="applyFilters()" id="f-pull-date" /></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="job-body"></tbody>
  </table>
</div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/Mengjie-Helen/job_hunting/main/daily_jobs/all_jobs.csv';
const STORAGE_KEY = 'job_statuses';
const STATUS_OPTIONS = ['Not Applied', 'Applied', 'Phone Screen', 'Interviewing', 'Offer Received', 'Declined', 'Rejected'];
const STATUS_CLASS = {
  'applied': 's-applied',
  'phone screen': 's-phone',
  'interviewing': 's-interviewing',
  'offer received': 's-offer',
  'declined': 's-declined',
  'rejected': 's-rejected',
};

let allRows = [];
let activeStatusFilter = 'all';

// --- CSV parser ---
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

// --- Status persistence ---
function getStatuses() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveStatus(key, value) {
  const s = getStatuses(); s[key] = value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
function getStatusKey(row) {
  return (row['Application Link'] || '') + '||' + (row['Job Title'] || '');
}

// --- Render ---
function render(rows) {
  const tbody = document.getElementById('job-body');
  const statuses = getStatuses();
  tbody.innerHTML = '';

  rows.forEach(row => {
    const key = getStatusKey(row);
    const status = (statuses[key] || 'Not Applied').toLowerCase();
    const statusClass = STATUS_CLASS[status] || '';

    const tr = document.createElement('tr');
    tr.dataset.title      = (row['Job Title'] || '').toLowerCase();
    tr.dataset.company    = (row['Company'] || '').toLowerCase();
    tr.dataset.location   = (row['Location'] || '').toLowerCase();
    tr.dataset.salary     = (row['Salary Range'] || '').toLowerCase();
    tr.dataset.datePosted = (row['Date Posted'] || '').toLowerCase();
    tr.dataset.why        = (row['Why It Matches'] || '').toLowerCase();
    tr.dataset.pullDate   = (row['Pull Date'] || '').toLowerCase();
    tr.dataset.status     = status;
    tr.dataset.key        = key;

    const link = row['Application Link'] || '';
    const linkCell = link
      ? `<a href="${link}" target="_blank" rel="noopener">Apply ↗</a>`
      : '—';

    // build status dropdown
    const opts = STATUS_OPTIONS.map(o =>
      `<option value="${o}" ${o.toLowerCase() === status ? 'selected' : ''}>${o}</option>`
    ).join('');

    tr.innerHTML = `
      <td class="title">${row['Job Title'] || ''}</td>
      <td class="company">${row['Company'] || ''}</td>
      <td class="location">${row['Location'] || ''}</td>
      <td class="salary">${row['Salary Range'] || ''}</td>
      <td class="date-posted">${row['Date Posted'] || ''}</td>
      <td class="link">${linkCell}</td>
      <td class="why">${row['Why It Matches'] || ''}</td>
      <td class="pull-date">${row['Pull Date'] || ''}</td>
      <td class="status"><select class="${statusClass}" onchange="onStatusChange(this, '${key}')">${opts}</select></td>
    `;
    tbody.appendChild(tr);
  });

  updateStats();
}

function onStatusChange(sel, key) {
  const val = sel.value;
  saveStatus(key, val);
  sel.className = STATUS_CLASS[val.toLowerCase()] || '';
  const tr = sel.closest('tr');
  tr.dataset.status = val.toLowerCase();
  applyFilters();
}

// --- Filters ---
function applyFilters() {
  const f = {
    title:      document.getElementById('f-title').value.toLowerCase(),
    company:    document.getElementById('f-company').value.toLowerCase(),
    location:   document.getElementById('f-location').value.toLowerCase(),
    salary:     document.getElementById('f-salary').value.toLowerCase(),
    datePosted: document.getElementById('f-date-posted').value.toLowerCase(),
    why:        document.getElementById('f-why').value.toLowerCase(),
    pullDate:   document.getElementById('f-pull-date').value.toLowerCase(),
  };

  let visibleCount = 0;
  document.querySelectorAll('#job-body tr').forEach(tr => {
    const matchesText =
      tr.dataset.title.includes(f.title) &&
      tr.dataset.company.includes(f.company) &&
      tr.dataset.location.includes(f.location) &&
      tr.dataset.salary.includes(f.salary) &&
      tr.dataset.datePosted.includes(f.datePosted) &&
      tr.dataset.why.includes(f.why) &&
      tr.dataset.pullDate.includes(f.pullDate);

    const matchesStatus = activeStatusFilter === 'all' || tr.dataset.status === activeStatusFilter;

    const visible = matchesText && matchesStatus;
    tr.classList.toggle('hidden', !visible);
    if (visible) visibleCount++;
  });

  document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
  updateStats();
}

function filterStatus(status, btn) {
  activeStatusFilter = status;
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function clearAllFilters() {
  ['f-title','f-company','f-location','f-salary','f-date-posted','f-why','f-pull-date']
    .forEach(id => document.getElementById(id).value = '');
  activeStatusFilter = 'all';
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  document.querySelector('#controls button').classList.add('active');
  applyFilters();
}

function updateStats() {
  const rows = document.querySelectorAll('#job-body tr');
  const visible = [...rows].filter(r => !r.classList.contains('hidden'));
  const statuses = [...rows].map(r => r.dataset.status);

  document.getElementById('stat-total').textContent = rows.length;
  document.getElementById('stat-showing').textContent = visible.length;
  document.getElementById('stat-applied').textContent = statuses.filter(s => s === 'applied').length;
  document.getElementById('stat-interviewing').textContent = statuses.filter(s => s === 'interviewing').length;
  document.getElementById('stat-offers').textContent = statuses.filter(s => s === 'offer received').length;
}

// --- Load ---
async function load() {
  try {
    const res = await fetch(CSV_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('Failed to fetch CSV');
    const text = await res.text();
    allRows = parseCSV(text);

    const pullDates = [...new Set(allRows.map(r => r['Pull Date']).filter(Boolean))].sort().reverse();
    document.getElementById('last-updated').textContent =
      pullDates.length ? 'Last updated: ' + pullDates[0] : '';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('job-table').style.display = 'table';
    render(allRows);
    applyFilters();
  } catch (e) {
    document.getElementById('loading').textContent = 'Error loading data. Make sure the GitHub repo is public. (' + e.message + ')';
  }
}

load();
</script>
</body>
</html>
